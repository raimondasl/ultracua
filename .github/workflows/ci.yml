name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]   # Windows is the primary dev platform; Linux is the portability check
    env:
      UV_PYTHON: "3.12"                        # match the dev interpreter (project requires >=3.12)
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0   # no moving `v8` tag is published; pin the full release
        with:
          enable-cache: true

      # The suite drives real headless Chromium against local HTTP fixtures (no API keys, no network),
      # so it needs the browser + (on Linux) its system libraries. `--group bench` pulls in MiniWoB++.
      - name: Install Chromium + system deps (Linux)
        if: runner.os == 'Linux'
        run: uv run --group bench playwright install --with-deps chromium

      - name: Install Chromium (Windows)
        if: runner.os == 'Windows'
        run: uv run --group bench playwright install chromium

      - name: Run the test suite
        # `--group providers` installs the OpenAI / Gemini SDKs and `--group mcp` the MCP SDK, so the
        # provider live-path + MCP-server tests actually run here (they `importorskip` and would
        # otherwise silently skip). Still key-less (no API keys, no network beyond localhost fixtures).
        run: uv run --group bench --group providers --group mcp pytest -q
